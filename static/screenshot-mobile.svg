<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#0e0c0b"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#1a1613"/>
  <!-- Nav bar -->
  <rect y="44" width="390" height="56" fill="rgba(14,12,11,0.96)"/>
  <!-- Logo circle -->
  <circle cx="36" cy="72" r="18" fill="#0e0c0b" stroke="#c8973f" stroke-width="2"/>
  <circle cx="36" cy="72" r="12" fill="none" stroke="#c8973f" stroke-width="1.5"/>
  <circle cx="36" cy="72" r="5" fill="#c8973f"/>
  <!-- Logo text -->
  <text x="62" y="78" font-family="Arial,sans-serif" font-weight="700" font-size="16" fill="#c8973f">VinylVault Pro</text>
  <!-- Hero section -->
  <rect y="120" width="390" height="160" fill="#1a1613" rx="0"/>
  <text x="195" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#c8973f">VinylVault Pro</text>
  <text x="195" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#9a8678">Professional eBay Listing Generator</text>
  <!-- Upload area -->
  <rect x="20" y="295" width="350" height="120" rx="12" fill="#1a1613" stroke="#2e2924" stroke-width="1"/>
  <text x="195" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#9a8678">📷 Upload Record Photos</text>
  <text x="195" y="368" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#4a3f38">Tap to select or drag images</text>
  <!-- Form fields -->
  <rect x="20" y="430" width="350" height="44" rx="8" fill="#1a1613" stroke="#2e2924" stroke-width="1"/>
  <text x="36" y="457" font-family="Arial,sans-serif" font-size="13" fill="#4a3f38">Artist Name</text>
  <rect x="20" y="484" width="350" height="44" rx="8" fill="#1a1613" stroke="#2e2924" stroke-width="1"/>
  <text x="36" y="511" font-family="Arial,sans-serif" font-size="13" fill="#4a3f38">Album Title</text>
  <!-- Generate button -->
  <rect x="20" y="540" width="350" height="50" rx="10" fill="#c8973f"/>
  <text x="195" y="571" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="15" fill="#0e0c0b">Generate Listing</text>
  <!-- Bottom nav -->
  <rect y="780" width="390" height="64" fill="#1a1613" stroke="#2e2924" stroke-width="1"/>
  <text x="49" y="806" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c8973f">🏠</text>
  <text x="49" y="820" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c8973f">Listing</text>
  <text x="130" y="806" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">💰</text>
  <text x="130" y="820" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">Deals</text>
  <text x="211" y="806" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">📀</text>
  <text x="211" y="820" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">Collection</text>
  <text x="341" y="806" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">⚙️</text>
  <text x="341" y="820" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#9a8678">Settings</text>
</svg>
