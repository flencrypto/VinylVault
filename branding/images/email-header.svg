<!-- VinylFort Email Header placeholder — 600 × 200 px
     Used as the header image in transactional and marketing emails.
     Replace with your production email header SVG or export as PNG.
     DEPLOYMENT: export to static/email-header.png and host on CDN or static host.
     NOTE: Inline the image as a hosted URL in your email template — most email clients
     do not support SVG, so always export as PNG. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="emailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0e0c0b"/>
      <stop offset="100%" stop-color="#1a1613"/>
    </linearGradient>
  </defs>
  <rect width="600" height="200" fill="url(#emailGrad)"/>
  <!-- Vinyl decorations -->
  <circle cx="520" cy="100" r="85" fill="none" stroke="#2e2924" stroke-width="2"/>
  <circle cx="520" cy="100" r="60" fill="none" stroke="#2e2924" stroke-width="1.5"/>
  <circle cx="520" cy="100" r="35" fill="#c8973f" opacity="0.10"/>
  <circle cx="520" cy="100" r="35" fill="none" stroke="#c8973f" stroke-width="1.5"/>
  <circle cx="520" cy="100" r="8"  fill="#0e0c0b" stroke="#c8973f" stroke-width="1.5"/>
  <!-- Logo + name -->
  <text x="40" y="90" font-family="'Cormorant Garamond',Georgia,serif"
        font-size="48" font-weight="700" fill="#f5ede2">VinylFort</text>
  <text x="40" y="128" font-family="Inter,system-ui,sans-serif"
        font-size="16" fill="#c8b19c">Professional vinyl valuation &amp; marketplace</text>
  <!-- Divider -->
  <line x1="40" y1="148" x2="420" y2="148" stroke="#2e2924" stroke-width="1"/>
  <!-- Placeholder label -->
  <rect x="20" y="166" width="560" height="24" rx="5" fill="#c8973f" opacity="0.10"/>
  <text x="300" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="11" fill="#8a6e52">PLACEHOLDER — 600 × 200 px — export as PNG</text>
</svg>
