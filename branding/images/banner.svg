<!-- VinylVault Hero Banner — 1440 × 480 px
     Production banner SVG for the web app hero section.
     DEPLOYMENT: export as PNG to static/vinylvault.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" width="1440" height="480">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f1a24"/>
      <stop offset="50%"  stop-color="#132230"/>
      <stop offset="100%" stop-color="#1a2e3e"/>
    </linearGradient>
    <!-- Gold record gradients -->
    <radialGradient id="recordOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#e8c55a"/>
      <stop offset="40%" stop-color="#c8973f"/>
      <stop offset="70%" stop-color="#a67830"/>
      <stop offset="85%" stop-color="#c8973f"/>
      <stop offset="100%" stop-color="#8a6520"/>
    </radialGradient>
    <radialGradient id="recordInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d4a84a"/>
      <stop offset="50%" stop-color="#b8922e"/>
      <stop offset="100%" stop-color="#9a7a28"/>
    </radialGradient>
    <!-- Teal glow for chip -->
    <radialGradient id="chipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00e5c3" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00c4a8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00a08a" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#1e3545" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Record groove pattern -->
    <radialGradient id="grooveSheen" cx="40%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#e8d070" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8973f" stop-opacity="0"/>
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#14303f"/>
      <stop offset="100%" stop-color="#0f2430"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="480" fill="url(#bgGrad)"/>
  <rect width="1440" height="480" fill="url(#grid)" opacity="0.4"/>

  <!-- Subtle ambient glow behind record -->
  <ellipse cx="1080" cy="230" rx="320" ry="300" fill="#00e5c3" opacity="0.02"/>

  <!-- ============ CIRCUIT LINES ============ -->
  <!-- Lines extending from the record area to the right -->
  <g stroke="#2a5a5a" stroke-width="1" fill="none" opacity="0.5">
    <!-- Top-right lines -->
    <path d="M1200 80 L1320 80 L1320 60"/>
    <path d="M1250 100 L1380 100"/>
    <path d="M1220 120 L1300 120 L1340 80"/>
    <!-- Right-side lines -->
    <path d="M1300 180 L1400 180 L1400 160"/>
    <path d="M1280 200 L1360 200 L1360 220"/>
    <path d="M1320 240 L1420 240"/>
    <!-- Bottom-right lines -->
    <path d="M1250 320 L1380 320 L1380 340"/>
    <path d="M1200 360 L1320 360"/>
    <path d="M1280 380 L1400 380 L1400 400"/>
    <!-- Top-left from record -->
    <path d="M900 100 L820 100 L820 80"/>
    <path d="M880 140 L780 140"/>
  </g>
  <!-- Brighter teal circuit lines -->
  <g stroke="#1aaa90" stroke-width="1" fill="none" opacity="0.4">
    <path d="M1180 60 L1180 40 L1250 40"/>
    <path d="M1300 280 L1380 280 L1380 300"/>
    <path d="M920 300 L850 300 L850 320"/>
  </g>
  <!-- Circuit line dots (nodes) -->
  <g fill="#2dd4a8" opacity="0.6">
    <circle cx="1320" cy="60" r="2.5"/>
    <circle cx="1380" cy="100" r="2.5"/>
    <circle cx="1400" cy="160" r="2.5"/>
    <circle cx="1360" cy="220" r="2.5"/>
    <circle cx="1420" cy="240" r="2.5"/>
    <circle cx="1380" cy="340" r="2.5"/>
    <circle cx="1400" cy="400" r="2.5"/>
    <circle cx="820" cy="80" r="2.5"/>
    <circle cx="780" cy="140" r="2.5"/>
    <circle cx="1250" cy="40" r="2.5"/>
    <circle cx="1380" cy="300" r="2.5"/>
    <circle cx="850" cy="320" r="2.5"/>
  </g>

  <!-- Dashed circle (orbit) around record -->
  <circle cx="1080" cy="230" r="220" fill="none" stroke="#1a4a4a" stroke-width="0.8"
          stroke-dasharray="6 8" opacity="0.35"/>
  <circle cx="1080" cy="230" r="250" fill="none" stroke="#1a4a4a" stroke-width="0.5"
          stroke-dasharray="3 10" opacity="0.2"/>

  <!-- ============ VINYL RECORD ============ -->
  <g transform="translate(1080,230)">
    <!-- Outer shadow -->
    <circle cx="4" cy="6" r="175" fill="#000" opacity="0.3"/>
    <!-- Record body -->
    <circle r="175" fill="url(#recordOuter)"/>
    <!-- Groove rings -->
    <circle r="170" fill="none" stroke="#b08030" stroke-width="0.5" opacity="0.5"/>
    <circle r="160" fill="none" stroke="#9a7020" stroke-width="0.5" opacity="0.4"/>
    <circle r="150" fill="none" stroke="#b08030" stroke-width="0.3" opacity="0.4"/>
    <circle r="140" fill="none" stroke="#9a7020" stroke-width="0.5" opacity="0.35"/>
    <circle r="130" fill="none" stroke="#b08030" stroke-width="0.3" opacity="0.35"/>
    <circle r="120" fill="none" stroke="#9a7020" stroke-width="0.5" opacity="0.3"/>
    <circle r="110" fill="none" stroke="#b08030" stroke-width="0.3" opacity="0.3"/>
    <circle r="100" fill="none" stroke="#9a7020" stroke-width="0.5" opacity="0.25"/>
    <circle r="90"  fill="none" stroke="#b08030" stroke-width="0.3" opacity="0.25"/>
    <!-- Sheen highlight -->
    <circle r="175" fill="url(#grooveSheen)"/>
    <!-- Inner label area -->
    <circle r="65" fill="url(#recordInner)"/>
    <circle r="65" fill="none" stroke="#d4b060" stroke-width="1"/>
    <!-- VINYLVAULT label text -->
    <text y="-30" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
          font-size="11" font-weight="700" letter-spacing="3" fill="#f0e0c0" opacity="0.9">VINYLVAULT</text>

    <!-- ============ CHIP CENTER ============ -->
    <!-- Chip glow -->
    <circle r="40" fill="url(#chipGlow)"/>
    <!-- Chip square body -->
    <rect x="-22" y="-22" width="44" height="44" rx="4" fill="#0a2a2a" stroke="#00e5c3" stroke-width="1.5"/>
    <!-- Chip inner pattern -->
    <rect x="-14" y="-14" width="28" height="28" rx="2" fill="none" stroke="#00c4a8" stroke-width="0.8" opacity="0.6"/>
    <rect x="-8" y="-8" width="16" height="16" rx="1" fill="none" stroke="#00e5c3" stroke-width="0.6" opacity="0.5"/>
    <!-- Chip pins -->
    <g stroke="#00d4b0" stroke-width="1.2">
      <!-- Top pins -->
      <line x1="-10" y1="-22" x2="-10" y2="-30"/>
      <line x1="0"   y1="-22" x2="0"   y2="-30"/>
      <line x1="10"  y1="-22" x2="10"  y2="-30"/>
      <!-- Bottom pins -->
      <line x1="-10" y1="22" x2="-10" y2="30"/>
      <line x1="0"   y1="22" x2="0"   y2="30"/>
      <line x1="10"  y1="22" x2="10"  y2="30"/>
      <!-- Left pins -->
      <line x1="-22" y1="-10" x2="-30" y2="-10"/>
      <line x1="-22" y1="0"   x2="-30" y2="0"/>
      <line x1="-22" y1="10"  x2="-30" y2="10"/>
      <!-- Right pins -->
      <line x1="22" y1="-10" x2="30" y2="-10"/>
      <line x1="22" y1="0"   x2="30" y2="0"/>
      <line x1="22" y1="10"  x2="30" y2="10"/>
    </g>
    <!-- Center dot -->
    <circle r="3" fill="#00e5c3" opacity="0.8"/>
  </g>

  <!-- ============ TEXT CONTENT ============ -->
  <!-- VinylVault logo text -->
  <text x="80" y="100" font-family="'Cormorant Garamond','Playfair Display',Georgia,serif"
        font-size="52" font-weight="700" font-style="italic" fill="#f0e8d8">VinylVault</text>

  <!-- Headline -->
  <text x="80" y="190" font-family="'Cormorant Garamond','Playfair Display',Georgia,serif"
        font-size="68" font-weight="700" fill="#d4a84a">Discover Deals,</text>
  <text x="80" y="270" font-family="'Cormorant Garamond','Playfair Display',Georgia,serif"
        font-size="68" font-weight="700" fill="#d4a84a">Create Listings</text>

  <!-- Subtitle -->
  <text x="80" y="315" font-family="Inter,system-ui,sans-serif"
        font-size="18" fill="#8ca0b0">AI-powered price tracking, instant listings, and exclusive drops</text>

  <!-- ============ FEATURE CARDS ============ -->
  <!-- Card 1: List -->
  <g transform="translate(80,350)">
    <rect width="120" height="70" rx="8" fill="url(#cardGrad)" stroke="#1a4a4a" stroke-width="1"/>
    <!-- Icon placeholder -->
    <rect x="12" y="12" width="14" height="10" rx="2" fill="none" stroke="#2dd4a8" stroke-width="1.2"/>
    <line x1="12" y1="15" x2="26" y2="15" stroke="#2dd4a8" stroke-width="0.8"/>
    <!-- Label -->
    <text x="34" y="21" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2dd4a8">List</text>
    <!-- Mock lines -->
    <rect x="12" y="34" width="96" height="3" rx="1.5" fill="#1a4a5a" opacity="0.8"/>
    <rect x="12" y="42" width="80" height="3" rx="1.5" fill="#1a4a5a" opacity="0.6"/>
    <rect x="12" y="50" width="88" height="3" rx="1.5" fill="#1a4a5a" opacity="0.5"/>
  </g>

  <!-- Card 2: Scan -->
  <g transform="translate(215,350)">
    <rect width="120" height="70" rx="8" fill="url(#cardGrad)" stroke="#1a4a4a" stroke-width="1"/>
    <!-- Scan icon -->
    <circle cx="20" cy="17" r="6" fill="none" stroke="#2dd4a8" stroke-width="1.2"/>
    <line x1="24" y1="21" x2="28" y2="25" stroke="#2dd4a8" stroke-width="1.2"/>
    <!-- Label -->
    <text x="34" y="21" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2dd4a8">Scan</text>
    <!-- Mock lines -->
    <rect x="12" y="34" width="96" height="3" rx="1.5" fill="#2dd4a8" opacity="0.4"/>
    <rect x="12" y="42" width="70" height="3" rx="1.5" fill="#2dd4a8" opacity="0.3"/>
    <rect x="12" y="50" width="84" height="3" rx="1.5" fill="#2dd4a8" opacity="0.25"/>
  </g>

  <!-- Card 3: Deals -->
  <g transform="translate(350,350)">
    <rect width="120" height="70" rx="8" fill="url(#cardGrad)" stroke="#1a4a4a" stroke-width="1"/>
    <!-- Deals icon -->
    <path d="M14 20 L20 12 L26 20" fill="none" stroke="#2dd4a8" stroke-width="1.2"/>
    <line x1="20" y1="12" x2="20" y2="25" stroke="#2dd4a8" stroke-width="1.2"/>
    <!-- Label -->
    <text x="34" y="21" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2dd4a8">Deals</text>
    <!-- Mock lines -->
    <rect x="12" y="34" width="96" height="3" rx="1.5" fill="#1a4a5a" opacity="0.8"/>
    <rect x="12" y="42" width="60" height="3" rx="1.5" fill="#1a4a5a" opacity="0.6"/>
    <rect x="12" y="50" width="78" height="3" rx="1.5" fill="#1a4a5a" opacity="0.5"/>
  </g>

  <!-- LIVE DEAL badge -->
  <g transform="translate(490,370)">
    <rect width="100" height="32" rx="4" fill="#00e5c3"/>
    <text x="50" y="21" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
          font-size="14" font-weight="700" fill="#0a1a1a">LIVE DEAL</text>
  </g>

  <!-- ============ DECORATIVE DOTS (bottom right) ============ -->
  <g fill="#2dd4a8" opacity="0.5">
    <rect x="1280" y="420" width="4" height="4" rx="1"/>
    <rect x="1292" y="420" width="4" height="4" rx="1"/>
    <rect x="1304" y="420" width="4" height="4" rx="1"/>
    <rect x="1316" y="420" width="4" height="4" rx="1"/>
    <rect x="1328" y="420" width="4" height="4" rx="1"/>
    <rect x="1340" y="420" width="4" height="4" rx="1"/>
    <rect x="1352" y="420" width="4" height="4" rx="1"/>
    <rect x="1364" y="420" width="4" height="4" rx="1"/>
  </g>

  <!-- ============ FOOTER LABEL ============ -->
  <text x="720" y="468" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="11" letter-spacing="1.5" fill="#4a6a7a" opacity="0.7">VINYLVAULT APP BANNER — 1440 x 480 px — export as PNG to static/vinylvault.png</text>
</svg>
