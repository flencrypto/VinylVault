<!-- VinylVault PWA Splash Screen placeholder — 1242 × 2208 px (iPhone 14 Pro Max)
     Shown by iOS and Android while the PWA is loading.
     Replace with your production splash screen SVG or export as PNG.
     DEPLOYMENT: export PNGs at each required size and reference in manifest.json:
       "screenshots": [
         { "src": "/static/splash-1242x2208.png", "sizes": "1242x2208", "type": "image/png", "form_factor": "narrow" }
       ]
     Common sizes: 1242×2208, 1125×2436, 1170×2532, 1284×2778, 828×1792 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1242 2208" width="1242" height="2208">
  <defs>
    <radialGradient id="splashGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#c8973f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0e0c0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1242" height="2208" fill="#0e0c0b"/>
  <rect width="1242" height="2208" fill="url(#splashGlow)"/>
  <!-- Vinyl record decoration -->
