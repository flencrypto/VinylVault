  <text x="256" y="248" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="22" font-weight="700" fill="#c8973f">VINYL</text>
  <text x="256" y="272" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="22" font-weight="700" fill="#e8c06a">FORT</text>
  <!-- Placeholder label -->
  <rect x="20" y="460" width="472" height="32" rx="6" fill="#c8973f" opacity="0.12"/>
  <text x="256" y="481" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
