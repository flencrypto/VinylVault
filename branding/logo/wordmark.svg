<!-- VinylFort Wordmark placeholder — 1200 × 300 px
     Horizontal layout: icon + brand name side by side.
     Replace this entire file with your production wordmark SVG.
     DEPLOYMENT: copy to static/wordmark.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <rect width="1200" height="300" fill="#0e0c0b"/>
  <!-- Icon mark -->
  <circle cx="150" cy="150" r="110" fill="#1a1613"/>
  <circle cx="150" cy="150" r="110" fill="none" stroke="#2e2924" stroke-width="3"/>
  <circle cx="150" cy="150" r="80"  fill="none" stroke="#2e2924" stroke-width="2"/>
  <circle cx="150" cy="150" r="48"  fill="#c8973f" opacity="0.12"/>
  <circle cx="150" cy="150" r="48"  fill="none" stroke="#c8973f" stroke-width="2"/>
  <circle cx="150" cy="150" r="10"  fill="#0e0c0b" stroke="#c8973f" stroke-width="2"/>
  <!-- Brand name -->
  <text x="300" y="130" font-family="'Cormorant Garamond',Georgia,serif"
        font-size="96" font-weight="700" fill="#f5ede2">Vinyl</text>
  <text x="300" y="230" font-family="'Cormorant Garamond',Georgia,serif"
        font-size="96" font-weight="700" fill="#c8973f">Fort</text>
  <!-- Placeholder label -->
  <rect x="20" y="265" width="1160" height="26" rx="5" fill="#c8973f" opacity="0.10"/>
  <text x="600" y="282" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="12" fill="#8a6e52">PLACEHOLDER — replace with production wordmark</text>
</svg>
