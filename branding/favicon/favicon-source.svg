<!-- VinylVault Favicon Source — scalable SVG
     Use this as the source for all ICO / PNG favicon exports.
     See branding/favicon/README.md for export instructions.
     DEPLOYMENT: copy to static/favicon.svg
                 export as static/favicon.ico (multi-size: 16, 32, 48 px)
                 export as static/favicon-32.png (32 × 32)
                 export as static/apple-touch-icon.png (180 × 180) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#0e0c0b"/>
  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#1a1613" stroke-width="5"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1a1613" stroke-width="4"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#1a1613" stroke-width="3"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#1a1613" stroke-width="2"/>
  <!-- Label -->
  <circle cx="256" cy="256" r="82"  fill="#c8973f" opacity="0.15"/>
  <circle cx="256" cy="256" r="82"  fill="none" stroke="#c8973f" stroke-width="3"/>
  <!-- Centre hole -->
  <circle cx="256" cy="256" r="16"  fill="#0e0c0b" stroke="#c8973f" stroke-width="2.5"/>
  <!-- VF initials -->
  <text x="256" y="246" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="30" font-weight="800" fill="#c8973f">VF</text>
  <text x="256" y="282" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="14" fill="#e8c06a" letter-spacing="4">VAULT</text>
</svg>
